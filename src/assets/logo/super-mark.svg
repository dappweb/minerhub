<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="superRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0B90B"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="superCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCD535"/>
      <stop offset="1" stop-color="#F0B90B"/>
    </linearGradient>
  </defs>
  <!-- orbit rings: Planet vibe -->
  <ellipse cx="128" cy="128" rx="118" ry="44" stroke="url(#superRing)" stroke-width="4" opacity="0.55" transform="rotate(-22 128 128)"/>
  <ellipse cx="128" cy="128" rx="118" ry="44" stroke="url(#superRing)" stroke-width="3" opacity="0.35" transform="rotate(24 128 128)"/>
  <!-- BNB style diamond frame -->
  <g transform="translate(128 128) rotate(45)">
    <rect x="-66" y="-66" width="132" height="132" rx="22" fill="#0B0E11" stroke="url(#superRing)" stroke-width="6"/>
  </g>
  <!-- S letter -->
  <text x="128" y="158" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="800" font-size="120" fill="url(#superCore)">S</text>
  <!-- orbit dots -->
  <circle cx="18" cy="110" r="4" fill="#F0B90B"/>
  <circle cx="236" cy="150" r="4" fill="#22D3EE"/>
</svg>
