    <rect width="210" height="38" rx="19" fill="#F0B90B"/>
    <text x="105" y="25" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="700" font-size="18" fill="#0B0E11">on BNB SMART CHAIN</text>
