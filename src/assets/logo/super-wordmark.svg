  <text x="108" y="112" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="800" font-size="104" letter-spacing="6" fill="url(#wm)">P</text>
  <text x="198" y="112" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="800" font-size="104" letter-spacing="6" fill="url(#wm)">E</text>
  <text x="320" y="112" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-weight="800" font-size="104" letter-spacing="6" fill="url(#wm)">R</text>
  <!-- BSC tag -->
